<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提交成功 - VIDream 河南总代理</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function () {
      var tone = "deep";
      function syncMobileHomeExperience() {
        var isMobile = false;
        try {
          isMobile = window.matchMedia ? window.matchMedia("(max-width: 900px)").matches : window.innerWidth <= 900;
        } catch (e0) {
          isMobile = (window.innerWidth || document.documentElement.clientWidth || 0) <= 900;
        }
        document.documentElement.classList.toggle("mobile-home-experience", isMobile);
        if (document.body) document.body.classList.toggle("mobile-home-experience", isMobile);
      }
      try {
        var stored = window.localStorage.getItem("vidream:tone");
        if (stored === "deep" || stored === "shallow") tone = stored;
      } catch (e) { }
      document.documentElement.setAttribute("data-tone", tone);
      document.addEventListener("DOMContentLoaded", syncMobileHomeExperience);
      window.addEventListener("resize", syncMobileHomeExperience);
    })();
  </script>
  <style>
    :root {
      --standalone-mobile-bg-base: #000;
    }

    :root[data-tone="shallow"] {
      --standalone-mobile-bg-base: #192338;
    }

    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(135deg, rgba(10, 10, 15, 0.7) 0%, rgba(26, 26, 46, 0.58) 50%, rgba(22, 33, 62, 0.54) 100%),
        #000 var(--standalone-page-bg-image, url("/images/bgVideo-firstframe.jpg")) center top / cover no-repeat;
      padding: 40px 24px;
    }

    .standalone-bg-mask {
      display: none;
    }

    .standalone-mobile-bg-video {
      display: none;
    }

    .success-card {
      max-width: 560px;
      width: 100%;
      padding: 48px 40px;
      text-align: center;
    }

    .success-card .icon {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      margin: 0 auto 20px;
    }

    .success-card .icon img {
      display: block;
      margin: 0 auto;
    }

    .success-card h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .success-card p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .success-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .success-actions .btn {
      width: 100%;
      max-width: 320px;
    }

    @media (max-width: 900px) {
      .success-actions .btn-primary {
        border-radius: 99px !important;
        font-size: 14px;
      }

      .success-actions .btn-outline {
        color: #fff;
        background: var(--glass-strong-bg);
        background-blend-mode: luminosity;
        backdrop-filter: blur(50px);
        -webkit-backdrop-filter: blur(50px);
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15);
        border: none;
        border-radius: 99px;
        font-size: 14px;
        position: relative;
      }

      .success-actions .btn-outline:hover {
        background: var(--glass-strong-bg);
        transform: translateY(-2px);
      }

      .success-actions .btn-outline::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(175deg,
            rgba(255, 252, 245, 0.52) 0%,
            rgba(255, 253, 248, 0.1) 6%,
            rgba(255, 254, 251, 0.02) 18%,
            rgba(255, 255, 255, 0) 38%,
            rgba(255, 255, 255, 0) 68%,
            rgba(243, 247, 255, 0.04) 86%,
            rgba(238, 244, 255, 0.12) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      .success-card {
        padding: 30px;
      }

      .success-card p {
        text-align: left;
      }

      .success-actions .btn {
        padding: 10px 20px;
      }

      .success-page {
        position: relative;
        isolation: isolate;
        overflow: hidden;
        background:
          var(--standalone-mobile-bg-base) var(--standalone-page-bg-image, url("/images/bgVideo-firstframe.jpg")) center top / cover no-repeat;
      }

      .standalone-bg-mask {
        display: block;
        z-index: 2;
      }

      .standalone-mobile-bg-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
        opacity: 0;
        pointer-events: none;
        display: none;
      }

      .standalone-mobile-bg-video.is-active {
        display: block;
      }

      .success-page::before,
      .success-page::after {
        content: "";
        position: absolute;
        inset: -18%;
        z-index: 1;
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .success-page::before {
        background:
          radial-gradient(circle at 24% 26%, rgba(114, 151, 255, 0.34), transparent 34%),
          radial-gradient(circle at 76% 18%, rgba(174, 119, 255, 0.24), transparent 28%);
        filter: blur(18px);
        animation: mobileBgGlowFloat 10s ease-in-out infinite;
      }

      .success-page::after {
        background:
          radial-gradient(circle at 68% 72%, rgba(74, 215, 255, 0.2), transparent 28%),
          radial-gradient(circle at 30% 78%, rgba(255, 255, 255, 0.12), transparent 24%);
        filter: blur(26px);
        animation: mobileBgGlowPulse 13s ease-in-out infinite;
      }

      .success-page>*:not(.standalone-bg-mask):not(.standalone-mobile-bg-video) {
        position: relative;
        z-index: 3;
      }
    }
  </style>
</head>

<body>
  <div class="success-page">
    <video class="standalone-mobile-bg-video" id="successPageMobileBgVideo" autoplay muted playsinline
      webkit-playsinline="true" x5-playsinline="true" x5-video-player-type="h5" x5-video-player-fullscreen="false" loop
      preload="auto" aria-hidden="true"></video>
    <div class="global-bg-mask standalone-bg-mask" aria-hidden="true"></div>
    <div class="success-card glass">
      <div class="icon">🎉</div>
      <h1>提交成功</h1>
      <p id="successText"></p>
      <div class="success-actions">
        <a id="trialLink" href="#" target="_blank" rel="noopener" class="btn btn-primary">点击立即试用，解锁 AI 创作能力 →</a>
        <a href="/order-preview" class="btn btn-primary">查看订单预览</a>
        <a href="/" class="btn btn-primary">返回首页</a>
      </div>
    </div>
  </div>

  <script src="/js/standalone-mobile-bg.js"></script>
  <script>
    (function () {
      fetch("/api/config")
        .then(function (r) { return r.json(); })
        .then(function (res) {
          if (res.success) {
            var config = res.data || {};
            if (window.StandaloneMobileBackground) {
              window.StandaloneMobileBackground.apply({
                config: config,
                pageSelector: ".success-page",
                videoSelector: "#successPageMobileBgVideo"
              });
            }
            var textEl = document.getElementById("successText");
            if (textEl) {
              textEl.textContent = config.success_page_text || "我们将在24小时内通过手机号与你联系，发送当前短剧订单需求列表。你也可以先免费体验VIDream AI短剧工具，解锁脚本生成、智能分镜、AI配音等功能，提前熟悉工具，提升接单效率。";
            }
            var trialLink = document.getElementById("trialLink");
            if (trialLink) {
              trialLink.href = config.vidream_trial_url || "https://www.vidream.net";
            }
          }
        })
        .catch(function () { });

      fetch("/api/page-view", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path: "/contact-success" }),
      }).catch(function () { });
    })();
  </script>
</body>

</html>
