<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单预览 - VIDream 河南总代理</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="/css/style.css">
<script>
  (function() {
    var tone = "deep";
    function syncMobileHomeExperience() {
      var isMobile = false;
      try {
        isMobile = window.matchMedia ? window.matchMedia("(max-width: 900px)").matches : window.innerWidth <= 900;
      } catch (e0) {
        isMobile = (window.innerWidth || document.documentElement.clientWidth || 0) <= 900;
      }
      document.documentElement.classList.toggle("mobile-home-experience", isMobile);
      if (document.body) document.body.classList.toggle("mobile-home-experience", isMobile);
    }
    try {
      var stored = window.localStorage.getItem("vidream:tone");
      if (stored === "deep" || stored === "shallow") tone = stored;
    } catch (e) {}
    document.documentElement.setAttribute("data-tone", tone);
    document.addEventListener("DOMContentLoaded", syncMobileHomeExperience);
    window.addEventListener("resize", syncMobileHomeExperience);
  })();
</script>
<style>
  :root {
    --standalone-mobile-bg-base: #000;
    --standalone-mobile-dialog-bg: rgba(6, 13, 30, 0.9);
    --standalone-mobile-alert-bg: rgba(8, 16, 36, 0.82);
    --standalone-mobile-alert-border: rgba(255, 255, 255, 0.16);
  }

  :root[data-tone="shallow"] {
    --standalone-mobile-bg-base: #192338;
    --standalone-mobile-dialog-bg: rgba(118, 146, 196, 0.32);
    --standalone-mobile-alert-bg: rgba(122, 150, 204, 0.28);
    --standalone-mobile-alert-border: rgba(255, 255, 255, 0.28);
  }

  .orders-page {
    min-height: 100vh;
    background:
      linear-gradient(135deg, rgba(10, 10, 15, 0.7) 0%, rgba(26, 26, 46, 0.58) 50%, rgba(22, 33, 62, 0.54) 100%),
      #000 var(--standalone-page-bg-image, url("/images/bgVideo-firstframe.jpg")) center top / cover no-repeat;
    padding: 60px 24px;
  }
  .standalone-bg-mask {
    display: none;
  }
  .standalone-mobile-bg-video {
    display: none;
  }
  .orders-container {
    max-width: 900px;
    margin: 0 auto;
  }
  .orders-list {
    min-height: 0;
  }
  .orders-container h1 {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 40px;
  }
  .orders-container h1 span {
    background: linear-gradient(135deg, var(--accent), #a29bfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .order-card {
    padding: 20px;
    margin-bottom: 20px;
    transition: var(--transition);
  }
  .order-card:hover {
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, 0.3);
  }
  .order-card h3 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .order-meta {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    font-size: 14px;
    color: var(--text-secondary);
  }
  .order-meta span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .order-meta .tag {
    padding: 4px 12px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 500;
  }
  .tag-drama {
    background: rgba(108, 92, 231, 0.2);
    color: var(--accent);
  }
  .tag-budget {
    background: rgba(0, 200, 150, 0.15);
    color: #00c896;
  }
  .order-requirements {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .order-card .btn {
    font-size: 14px;
    padding: 10px 24px;
  }
  .order-card .btn.is-registered {
    position: relative;
    background: var(--glass-strong-bg);
    background-blend-mode: luminosity;
    backdrop-filter: blur(36px);
    -webkit-backdrop-filter: blur(36px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: rgba(255, 255, 255, 0.92);
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.14);
    cursor: default;
  }
  .order-card .btn.is-registered::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(175deg,
        rgba(255, 252, 245, 0.52) 0%,
        rgba(255, 253, 248, 0.1) 6%,
        rgba(255, 254, 251, 0.02) 18%,
        rgba(255, 255, 255, 0) 38%,
        rgba(255, 255, 255, 0) 68%,
        rgba(243, 247, 255, 0.04) 86%,
        rgba(238, 244, 255, 0.12) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
  .order-card .btn.is-registered:hover {
    transform: none;
    background: var(--glass-strong-bg);
  }
  .orders-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .orders-empty .icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .back-link {
    display: inline-block;
    margin-top: 32px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    text-align: center;
    width: 100%;
  }
  .back-link:hover {
    text-decoration: underline;
  }
  #orderPreviewInterestSuccessModal {
    padding: 20px;
  }
  #orderPreviewInterestSuccessModal .site-modal-dialog {
    width: min(520px, 100%);
    max-width: 520px;
    max-height: min(560px, calc(100vh - 40px));
    margin: 0;
    overflow: hidden;
    background: rgba(7, 15, 34, 0.82);
    border: 1px solid rgba(255, 255, 255, 0.14);
    box-shadow: 0 22px 70px rgba(0, 0, 0, 0.4);
  }
  #orderPreviewInterestSuccessModal .site-modal-body {
    padding: 28px 24px 32px;
    overflow: visible;
  }
  #orderPreviewInterestSuccessModal .success-card .icon {
    font-size: 60px;
    margin-bottom: 18px;
  }
  #orderPreviewInterestSuccessModal .success-card h1 {
    margin-bottom: 12px;
  }
  #orderPreviewInterestSuccessModal .success-card p {
    margin-bottom: 24px;
  }
  #orderPreviewInterestSuccessModal .success-actions .btn {
    max-width: 240px;
  }
  .order-preview-mobile-alert {
    position: fixed;
    inset: 0;
    z-index: 220;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(0, 0, 0, 0.4);
  }
  .order-preview-mobile-alert[hidden] {
    display: none !important;
  }
  .order-preview-mobile-alert-message {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: auto;
    max-width: calc(100vw - 48px);
    min-height: 52px;
    padding: 14px 22px;
    border-radius: 16px;
    background: var(--standalone-mobile-alert-bg);
    border: 1px solid var(--standalone-mobile-alert-border);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1.4;
    text-align: center;
    white-space: nowrap;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.32);
  }

  @media (max-width: 900px) {
    html,
    body {
      overflow: hidden;
    }

    .order-card .btn-primary {
      border-radius: 99px !important;
    }

    .order-card h3 {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .order-meta,
    .order-requirements {
      margin-bottom: 5px;
    }

    .order-meta {
      gap: 10px;
    }

    .order-meta .tag {
      padding: 2px 10px;
    }

    .order-card .btn {
      padding: 5px 16px;
    }

    .btn-outline {
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .orders-page {
      position: relative;
      isolation: isolate;
      min-height: 100dvh;
      height: 100dvh;
      overflow: hidden;
      padding: 28px 18px 24px;
      background:
        var(--standalone-mobile-bg-base) var(--standalone-page-bg-image, url("/images/bgVideo-firstframe.jpg")) center top / cover no-repeat;
    }

    .standalone-bg-mask {
      display: block;
      z-index: 2;
    }

    .standalone-mobile-bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      pointer-events: none;
      display: none;
    }

    .standalone-mobile-bg-video.is-active {
      display: block;
    }

    .orders-container {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .orders-container h1 {
      margin-bottom: 0;
      flex-shrink: 0;
      font-size: 22px;
    }

    .orders-list {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      -ms-overflow-style: none;
      scrollbar-width: none;
      padding-right: 2px;
    }

    .orders-list::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    .back-link {
      margin-top: 0;
      flex-shrink: 0;
    }

    #orderPreviewInterestSuccessModal {
      padding: 18px 16px;
    }

    #orderPreviewInterestSuccessModal .site-modal-dialog {
      max-height: min(520px, calc(100dvh - 36px));
      border-radius: 24px;
      background: var(--standalone-mobile-dialog-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    #orderPreviewInterestSuccessModal .site-modal-body {
      padding: 24px 20px 24px;
    }

    #orderPreviewInterestSuccessModal .success-card .icon {
      font-size: 54px;
      margin-bottom: 14px;
    }

    #orderPreviewInterestSuccessModal .success-card h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    #orderPreviewInterestSuccessModal .success-card p {
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    #orderPreviewInterestSuccessModal .success-actions .btn {
      width: 100%;
      max-width: none;
    }

    .order-preview-mobile-alert {
      padding: 20px;
    }

    .order-preview-mobile-alert-message {
      max-width: calc(100vw - 40px);
    }

    .orders-page::before,
    .orders-page::after {
      content: "";
      position: absolute;
      inset: -18%;
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .orders-page::before {
      background:
        radial-gradient(circle at 24% 26%, rgba(114, 151, 255, 0.34), transparent 34%),
        radial-gradient(circle at 76% 18%, rgba(174, 119, 255, 0.24), transparent 28%);
      filter: blur(18px);
      animation: mobileBgGlowFloat 10s ease-in-out infinite;
    }

    .orders-page::after {
      background:
        radial-gradient(circle at 68% 72%, rgba(74, 215, 255, 0.2), transparent 28%),
        radial-gradient(circle at 30% 78%, rgba(255, 255, 255, 0.12), transparent 24%);
      filter: blur(26px);
      animation: mobileBgGlowPulse 13s ease-in-out infinite;
    }

    .orders-page > *:not(.standalone-bg-mask):not(.standalone-mobile-bg-video) {
      position: relative;
      z-index: 3;
    }
  }
</style>
</head>
<body>
<div class="orders-page">
  <video class="standalone-mobile-bg-video" id="ordersPageMobileBgVideo" autoplay muted playsinline webkit-playsinline="true" x5-playsinline="true" x5-video-player-type="h5" x5-video-player-fullscreen="false" loop preload="auto" aria-hidden="true"></video>
  <div class="global-bg-mask standalone-bg-mask" aria-hidden="true"></div>
  <div class="orders-container">
    <h1>当前可承接的短剧订单</h1>
    <div class="orders-list custom-scrollbar" id="ordersList"></div>
    <a href="/" class="back-link">← 返回首页</a>
  </div>
</div>

<script src="/js/standalone-mobile-bg.js"></script>
<script>
(function() {
  var LEAD_ID_KEY = "vidream:leadId";
  var PENDING_ORDER_KEY = "vidream:pendingOrderId";
  var INTERESTED_ORDER_IDS_KEY = "vidream:interestedOrderIds";
  var HOME_SCROLL_TARGET_KEY = "vidream:homeScrollTarget";

  function escapeHTML(str) {
    if (!str) return "";
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  }

  function readSessionNumber(key) {
    var raw = null;
    try { raw = window.sessionStorage.getItem(key); } catch (e) {}
    if (!raw) return null;
    var value = parseInt(raw, 10);
    return isFinite(value) && value > 0 ? value : null;
  }

  function writeSessionNumber(key, value) {
    try {
      if (typeof value === "number" && isFinite(value) && value > 0) {
        window.sessionStorage.setItem(key, String(Math.round(value)));
      } else {
        window.sessionStorage.removeItem(key);
      }
    } catch (e) {}
  }

  function writeSessionText(key, value) {
    try {
      if (typeof value === "string" && value) {
        window.sessionStorage.setItem(key, value);
      } else {
        window.sessionStorage.removeItem(key);
      }
    } catch (e) {}
  }

  function readSessionNumberList(key) {
    var raw = null;
    try { raw = window.sessionStorage.getItem(key); } catch (e) {}
    if (!raw) return [];
    try {
      var parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return [];
      return parsed.map(function(item) {
        return parseInt(item, 10);
      }).filter(function(item) {
        return isFinite(item) && item > 0;
      });
    } catch (e2) {
      return [];
    }
  }

  function writeSessionNumberList(key, values) {
    try {
      if (!values || !values.length) {
        window.sessionStorage.removeItem(key);
        return;
      }
      window.sessionStorage.setItem(key, JSON.stringify(values));
    } catch (e) {}
  }

  function setInterestedOrderIds(orderIds) {
    var normalized = Array.isArray(orderIds) ? orderIds.map(function(item) {
      return parseInt(item, 10);
    }).filter(function(item) {
      return isFinite(item) && item > 0;
    }) : [];
    var unique = [];
    normalized.forEach(function(item) {
      if (unique.indexOf(item) >= 0) return;
      unique.push(item);
    });
    writeSessionNumberList(INTERESTED_ORDER_IDS_KEY, unique);
    return unique;
  }

  function isOrderInterested(orderId, interestedOrderIds) {
    return interestedOrderIds.indexOf(orderId) >= 0;
  }

  function markInterested(orderId) {
    var existing = readSessionNumberList(INTERESTED_ORDER_IDS_KEY);
    if (existing.indexOf(orderId) >= 0) return existing;
    existing.push(orderId);
    return setInterestedOrderIds(existing);
  }

  function renderSuccessModal(message) {
    var existing = document.getElementById("orderPreviewInterestSuccessModal");
    if (existing) existing.remove();
    var modal = document.createElement("div");
    modal.className = "site-modal";
    modal.id = "orderPreviewInterestSuccessModal";
    modal.innerHTML =
      '<div class="site-modal-backdrop" style="display:block"></div>' +
      '<div class="site-modal-dialog glass" role="dialog" aria-modal="true" aria-labelledby="orderPreviewInterestSuccessTitle" style="max-width:520px;margin:auto;">' +
      '<button class="site-modal-close" type="button" aria-label="关闭弹窗">×</button>' +
      '<div class="site-modal-body"><div class="site-modal-content success-modal-content"><div class="success-card">' +
      '<div class="icon">✅</div>' +
      '<h1 id="orderPreviewInterestSuccessTitle">登记成功</h1>' +
      '<p>' + escapeHTML(message || "我们已收到你的订单意向登记。") + '</p>' +
      '<div class="success-actions"><button type="button" class="btn btn-primary btn-lg">我知道了</button></div>' +
      '</div></div></div></div>';
    document.body.appendChild(modal);
    document.body.classList.add("modal-open");
    function closeModal() {
      modal.remove();
      document.body.classList.remove("modal-open");
    }
    modal.querySelector(".site-modal-close").addEventListener("click", closeModal);
    modal.querySelector(".btn").addEventListener("click", closeModal);
    modal.querySelector(".site-modal-backdrop").addEventListener("click", closeModal);
  }

  function loadInterestedOrders(leadId) {
    if (!leadId) return Promise.resolve(readSessionNumberList(INTERESTED_ORDER_IDS_KEY));
    return fetch("/api/order-interests?leadId=" + encodeURIComponent(String(leadId))).then(function(r) {
      return r.json();
    }).then(function(res) {
      var orderIds = res && res.success && res.data && Array.isArray(res.data.orderIds) ? res.data.orderIds : [];
      return setInterestedOrderIds(orderIds);
    }).catch(function() {
      return readSessionNumberList(INTERESTED_ORDER_IDS_KEY);
    });
  }

  function submitOrderInterest(leadId, orderId, buttonEl) {
    var originalText = buttonEl ? buttonEl.textContent : "";
    if (buttonEl) {
      buttonEl.disabled = true;
      buttonEl.textContent = "提交中...";
    }
    return fetch("/api/order-interests", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ leadId: leadId, orderId: orderId })
    }).then(function(r) {
      return r.json();
    }).catch(function() {
      return { success: false, message: "网络错误，请稍后重试" };
    }).then(function(res) {
      if (buttonEl) {
        buttonEl.disabled = false;
        buttonEl.textContent = originalText;
      }
      return res;
    });
  }

  function shouldUseMobileSuccessAlert() {
    return window.matchMedia && window.matchMedia("(max-width: 900px)").matches;
  }

  var mobileSuccessAlertTimer = null;

  function renderMobileSuccessAlert(message) {
    var existing = document.getElementById("orderPreviewMobileSuccessAlert");
    if (existing) existing.remove();
    if (mobileSuccessAlertTimer) {
      clearTimeout(mobileSuccessAlertTimer);
      mobileSuccessAlertTimer = null;
    }
    var alertEl = document.createElement("div");
    alertEl.className = "order-preview-mobile-alert";
    alertEl.id = "orderPreviewMobileSuccessAlert";
    alertEl.setAttribute("role", "status");
    alertEl.setAttribute("aria-live", "polite");
    alertEl.innerHTML = '<div class="order-preview-mobile-alert-message">' + escapeHTML(message || "登记成功！") + '</div>';
    function closeAlert() {
      if (!alertEl.parentNode) return;
      alertEl.remove();
      if (mobileSuccessAlertTimer) {
        clearTimeout(mobileSuccessAlertTimer);
        mobileSuccessAlertTimer = null;
      }
    }
    alertEl.addEventListener("click", closeAlert);
    document.body.appendChild(alertEl);
    mobileSuccessAlertTimer = setTimeout(closeAlert, 1400);
  }

  Promise.all([
    fetch("/api/config").then(function(r) { return r.json(); }).catch(function() { return { success: false }; }),
    fetch("/api/orders?status=active").then(function(r) { return r.json(); }),
    loadInterestedOrders(readSessionNumber(LEAD_ID_KEY))
  ])
    .then(function(results) {
      var configRes = results[0];
      var res = results[1];
      var interestedOrderIds = results[2] || [];
      if (configRes && configRes.success) {
        if (window.StandaloneMobileBackground) {
          window.StandaloneMobileBackground.apply({
            config: configRes.data || {},
            pageSelector: ".orders-page",
            videoSelector: "#ordersPageMobileBgVideo"
          });
        }
      }
      var container = document.getElementById("ordersList");
      if (!container) return;

      if (!res.success || !res.data || res.data.length === 0) {
        container.innerHTML = '<div class="orders-empty glass"><div class="icon">📋</div><p>暂无活跃订单，请稍后再来查看</p></div>';
        return;
      }

      container.innerHTML = res.data.map(function(order) {
        var orderId = parseInt(order.id, 10);
        var buttonHtml = isOrderInterested(orderId, interestedOrderIds)
          ? '<button type="button" class="btn btn-outline is-registered" disabled>已登记</button>'
          : '<button type="button" class="btn btn-primary" data-order-interest-id="' + escapeHTML(String(order.id == null ? "" : order.id)) + '">对此订单感兴趣 →</button>';
        return (
          '<div class="order-card glass">' +
          '<h3>' + escapeHTML(order.title) + '</h3>' +
          '<div class="order-meta">' +
          (order.dramaType ? '<span class="tag tag-drama">' + escapeHTML(order.dramaType) + '</span>' : '') +
          (order.budget ? '<span class="tag tag-budget">' + escapeHTML(order.budget) + '</span>' : '') +
          (order.deadline ? '<span>截止：' + escapeHTML(order.deadline) + '</span>' : '') +
          '</div>' +
          (order.requirements ? '<p class="order-requirements">' + escapeHTML(order.requirements) + '</p>' : '') +
          buttonHtml +
          '</div>'
        );
      }).join("");

      container.addEventListener("click", function(e) {
        var btn = e.target.closest ? e.target.closest("[data-order-interest-id]") : null;
        if (!btn) return;
        e.preventDefault();
        var orderId = parseInt(btn.getAttribute("data-order-interest-id") || "", 10);
        if (!isFinite(orderId) || orderId <= 0) {
          renderSuccessModal("未找到订单信息，请稍后重试。");
          return;
        }
        var leadId = readSessionNumber(LEAD_ID_KEY);
        if (!leadId) {
          writeSessionNumber(PENDING_ORDER_KEY, orderId);
          writeSessionText(HOME_SCROLL_TARGET_KEY, "contact");
          window.location.href = "/";
          return;
        }
        submitOrderInterest(leadId, orderId, btn).then(function(interestRes) {
          if (interestRes && interestRes.success) {
            writeSessionNumber(PENDING_ORDER_KEY, null);
            markInterested(orderId);
            btn.classList.remove("btn-primary");
            btn.classList.add("btn-outline", "is-registered");
            btn.removeAttribute("data-order-interest-id");
            btn.textContent = "已登记";
            btn.disabled = true;
            if (shouldUseMobileSuccessAlert()) {
              renderMobileSuccessAlert("登记成功！");
            } else {
              renderSuccessModal(interestRes.message || "我们已收到你的订单意向登记。");
            }
            return;
          }
          if (interestRes && interestRes.message === "线索不存在，请先提交联系方式") {
            writeSessionNumber(LEAD_ID_KEY, null);
            writeSessionNumberList(INTERESTED_ORDER_IDS_KEY, []);
            writeSessionNumber(PENDING_ORDER_KEY, orderId);
            writeSessionText(HOME_SCROLL_TARGET_KEY, "contact");
            window.location.href = "/";
            return;
          }
          renderSuccessModal((interestRes && interestRes.message) || "提交失败，请稍后重试。");
        });
      });
    })
    .catch(function() {
      var container = document.getElementById("ordersList");
      if (container) {
        container.innerHTML = '<div class="orders-empty glass"><div class="icon">⚠️</div><p>加载失败，请刷新页面重试</p></div>';
      }
    });

  fetch("/api/page-view", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ path: "/order-preview" }),
  }).catch(function() {});
})();
</script>
</body>
</html>
