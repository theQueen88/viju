spring.datasource.url=jdbc:sqlite:./data/vidream.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.port=9091

spring.web.resources.static-locations=classpath:/static/

spring.jackson.default-property-inclusion=non_null

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=120MB

vidream.oss.endpoint=${OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
vidream.oss.region=${OSS_REGION:cn-beijing}
vidream.oss.bucket=${OSS_BUCKET:viju}
vidream.oss.public-base-url=${OSS_PUBLIC_BASE_URL:https://viju.oss-cn-beijing.aliyuncs.com}
vidream.oss.prefix=background
vidream.oss.access-key-id=${OSS_ACCESS_KEY_ID:}
vidream.oss.access-key-secret=${OSS_ACCESS_KEY_SECRET:}
