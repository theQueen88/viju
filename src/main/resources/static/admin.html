<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - VIDream</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/scrollbar.css">
  <style>
    :root {
      --bg: #0f0f1a;
      --card-bg: #1a1a2e;
      --border: #2a2a4a;
      --accent: #6c5ce7;
      --text: #e0e0e0;
      --text-muted: #888;
      --danger: #ff6b6b;
      --success: #00c896;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button,
    input,
    textarea,
    select {
      font-family: inherit !important;
    }

    #adminPage {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .admin-header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      height: 60px;
      padding: 0 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .admin-header h1 {
      font-size: 20px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .admin-header .admin-logo {
      width: 26px;
      height: 26px;
      flex: 0 0 auto;
      object-fit: contain;
    }

    .admin-header .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .admin-header .logout-btn:hover {
      color: #fff;
      border-color: #fff;
    }

    .admin-layout {
      flex: 1;
      min-height: 0;
      display: flex;
    }

    .admin-aside {
      width: 220px;
      flex-shrink: 0;
      background: var(--card-bg);
      border-right: 1px solid var(--border);
      padding: 16px 12px;
    }

    .admin-aside-nav {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tab-btn {
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 10px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab-btn:hover {
      color: #fff;
      border-color: var(--border);
    }

    .tab-btn.active {
      color: #fff;
      background: rgba(108, 92, 231, 0.18);
      border-color: rgba(108, 92, 231, 0.35);
    }

    .admin-main {
      flex: 1;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .admin-main-scroll {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .admin-main-inner {
      height: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .tab-content {
      display: none;
      height: 100%;
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .admin-card-fill {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      margin-bottom: 0;
    }

    .card-body-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: auto;
    }

    .leads-table-host {
      overflow: hidden;
    }

    .card-body-scroll.card-body-empty {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
      padding-top: 36px;
    }

    .admin-empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 24px 0;
    }

    .admin-empty-state img {
      width: min(220px, 42%);
      height: auto;
      display: block;
      opacity: 0.95;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .card h3 {
      font-size: 16px;
      margin-bottom: 16px;
      color: var(--accent);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .card-head h3 {
      margin: 0;
    }

    .list-filters {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .list-filters-fields {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      min-width: 0;
      flex: 1 1 0;
    }

    .list-filter-field {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1 1 0;
    }

    .list-filter-field label,
    .list-filter-range label {
      flex: 0 0 auto;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .list-filter-field input,
    .list-filter-range input {
      height: 32px;
      padding: 0 12px;
      box-sizing: border-box;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
    }

    .list-filter-field input {
      min-width: 0;
      flex: 1 1 0;
    }

    #casesToolbar .list-filter-field {
      flex: 0 0 250px;
    }

    #casesToolbar #caseTitleFilter {
      width: 250px;
      min-width: 250px;
      flex: 0 0 250px;
    }

    .list-filter-field input:focus,
    .list-filter-range input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .list-filter-range {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 2 1 0;
    }

    .list-filter-range-inputs {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      min-width: 0;
      flex: 1 1 0;
    }

    .list-filter-range input {
      min-width: 0;
      flex: 1 1 0;
    }

    .list-filter-separator {
      color: var(--text-muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .list-filter-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex: 0 0 auto;
    }

    #leadsToolbar .list-filter-actions .btn-sm,
    #ordersToolbar .list-filter-actions .btn-sm,
    #casesToolbar .list-filter-actions .btn-sm {
      height: 32px;
      padding: 0 14px;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 900px) {
      .list-filter-field,
      .list-filter-range {
        width: 100%;
        justify-content: flex-start;
      }

      .list-filter-field input {
        flex: 1;
        min-width: 0;
      }

      .list-filter-range-inputs {
        flex: 1;
      }

      .list-filter-range input {
        flex: 1;
        min-width: 0;
      }
    }

    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: flex-start;
    }

    .form-row label {
      min-width: 100px;
      font-size: 13px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .form-row input,
    .form-row textarea,
    .form-row select {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }

    .form-row textarea {
      min-height: 80px;
      resize: vertical;
    }

    #configForm textarea[data-key="partner_logos"] {
      min-height: 120px;
      resize: none;
      overflow-y: hidden;
      scrollbar-width: none;
    }

    #configForm textarea[data-key="partner_logos"]::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .config-upload-tools {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .config-upload-tools input[type="file"] {
      flex: 1;
      padding: 8px 10px;
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 6px;
      color: var(--text);
    }

    .config-upload-preview {
      margin-top: 10px;
    }

    .config-upload-preview img {
      max-width: 220px;
      max-height: 220px;
      display: block;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
    }

    .admin-previewable-image {
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .admin-previewable-image:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .form-field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .form-field > input,
    .form-field > textarea,
    .form-field > select {
      flex: none;
      width: 100%;
    }

    .config-image-uploader {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .config-image-card {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .config-image-card.is-filled {
      background: rgba(0, 0, 0, 0.22);
    }

    .config-image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.2);
      display: block;
    }

    .config-image-placeholder {
      color: rgba(255, 255, 255, 0.45);
      font-size: 16px;
      letter-spacing: 1px;
      user-select: none;
    }

    .config-image-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .config-image-hint {
      font-size: 12px;
      color: var(--text-muted);
    }

    .config-image-gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .config-image-thumb {
      width: 100px;
      height: 100px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .config-image-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.2);
      display: block;
    }

    .config-image-thumb-item {
      width: 100px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .config-image-thumb-actions {
      display: flex;
      justify-content: center;
    }

    .config-image-thumb-actions .btn {
      width: 100%;
      padding-left: 0;
      padding-right: 0;
    }

    .form-row input:focus,
    .form-row textarea:focus,
    .form-row select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-danger:hover {
      opacity: 0.9;
    }

    .btn-sm {
      padding: 6px 14px;
      font-size: 12px;
    }

    #navigationConfigForm {
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    .navigation-subtabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin-bottom: 0;
      flex: 0 0 auto;
      border-bottom: 1px solid var(--border);
    }

    .navigation-panels-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;
    }

    .navigation-subtab {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 18px 12px;
      margin-bottom: -1px;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .navigation-subtab:hover {
      color: #fff;
    }

    .navigation-subtab.active {
      color: #fff;
      background: transparent;
      border-bottom-color: rgba(108, 92, 231, 0.9);
      box-shadow: none;
    }

    .navigation-subtab[data-bg-section="sequence"] {
      display: none !important;
    }

    .navigation-panel {
      display: none;
    }

    .navigation-panel.active {
      display: block;
    }

    .background-config-wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100%;
      overflow: hidden;
    }

    #backgroundConfigForm.card-body-scroll {
      overflow: hidden;
    }

    .background-panel-scroll {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .background-config-wrap.sequence-active .background-panel-scroll {
      overflow: hidden;
    }

    .background-panel {
      display: none;
    }

    .background-panel.active {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .background-panel[data-panel="sequence"] {
      display: none !important;
    }

    .background-config-wrap.sequence-active .background-panel.active {
      display: flex;
    }

    .background-asset-stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .background-panel.active .background-asset-stack {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      padding-right: 0;
    }

    .background-config-wrap.sequence-active .background-asset-stack {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      padding-right: 0;
    }

    .background-panel[data-panel="mobile"].active .background-asset-card[data-background-image-card="mobile"] {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .background-panel[data-panel="whole"].active .background-asset-card[data-background-video-card="whole"] {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .background-panel[data-panel="mobile"].active .background-asset-card-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;
    }

    .background-panel[data-panel="whole"].active .background-asset-card-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;
    }

    .background-asset-card {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(12, 15, 42, 0.42);
    }

    .background-config-wrap.sequence-active .background-asset-card[data-background-sequence-card="sequence"] {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .background-asset-title {
      margin: 0;
      font-size: 16px;
      color: #fff;
    }

    .background-asset-desc {
      margin: 8px 0 0;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .background-preview {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 16 / 9;
      margin-top: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .background-preview video,
    .background-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 16px;
    }

    .background-preview-empty {
      padding: 0 20px;
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      line-height: 1.7;
    }

    .background-asset-meta {
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.8;
      word-break: break-all;
    }

    .background-asset-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    .background-upload-progress {
      margin-top: 12px;
      color: var(--accent);
      font-size: 12px;
      min-height: 18px;
    }

    .background-subsection {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .background-subsection-title {
      margin: 0;
      font-size: 14px;
      color: #fff;
    }

    .background-subsection-desc {
      margin: 8px 0 0;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .background-derived-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .background-derived-card {
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
    }

    .background-derived-card .background-preview {
      max-width: none;
      margin-top: 12px;
    }

    .background-derived-card .background-asset-meta {
      min-height: 44px;
    }

    .background-inline-setting {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 420px;
    }

    .background-inline-setting label {
      color: var(--text-muted);
      font-size: 13px;
    }

    .background-inline-setting select {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }

    .background-inline-note {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .background-sequence-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
    }

    .background-sequence-actions {
      margin-left: auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 12px;
    }

    .background-sequence-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(56px, 1fr));
      gap: 12px;
      margin-top: 16px;
      align-content: start;
    }

    .background-config-wrap.sequence-active .background-sequence-gallery {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      align-content: flex-start;
      padding-right: 4px;
    }

    .background-sequence-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: stretch;
      width: 100%;
    }

    .background-sequence-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .background-sequence-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 10px;
    }

    .background-sequence-item .btn {
      width: 60px;
      padding-left: 0;
      padding-right: 0;
    }

    .hidden-config-value {
      display: none !important;
    }

    .config-row-hidden {
      display: none !important;
    }

    .config-help {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .config-list-editor {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .config-list-item {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(12, 15, 42, 0.42);
    }

    .config-list-item-inline {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
    }

    .config-list-item-inline .config-list-item-title {
      white-space: nowrap;
    }

    .config-list-item-inline input {
      min-width: 0;
      width: 100%;
    }

    .config-list-item-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .config-list-item-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    .config-list-item-title .config-help {
      display: inline;
      margin-left: 6px;
      font-weight: 400;
    }

    .config-list-item-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .config-inline-grid {
      display: grid;

  <script>
    var adminToken = "";
    var adminConfigCache = {};
    var ADMIN_TOKEN_STORAGE_KEY = "vidream:adminToken";
    var ADMIN_ACTIVE_TAB_STORAGE_KEY = "vidream:adminActiveTab";
    var ADMIN_NAV_SECTION_STORAGE_KEY = "vidream:adminNavigationSection";
    var ADMIN_BG_SECTION_STORAGE_KEY = "vidream:adminBackgroundSection";
    var ordersCache = {};
    var casesCache = {};
    var ordersAllItemsCache = [];
    var editingOrderId = null;
    var editingCaseId = null;
    var activeAdminModalId = null;
    var lastModalTriggerEl = null;
    var activeAdminImagePreview = false;
    var adminImagePreviewGroups = {};
    var activeAdminImagePreviewItems = [];
    var activeAdminImagePreviewIndex = 0;
    var lastImagePreviewTriggerEl = null;
    var pendingDeleteCaseId = null;
    var deleteCaseSubmitting = false;
    var confirmModalAction = null;
    var confirmModalSubmitting = false;
    var closePartnerLogoEditor = function () { closeAdminModal(); };
    var submitPartnerLogoEditor = function () { };
    var LEADS_PAGE_SIZE = 10;
    var ORDERS_PAGE_SIZE = 10;
    var CASES_PAGE_SIZE = 10;
    var leadsAllItemsCache = [];
    var casesAllItemsCache = [];
    var leadsFilters = { phone: "", startDate: "", endDate: "" };
    var orderFilters = { title: "", startDate: "", endDate: "" };
    var caseFilters = { title: "" };
    var leadsPagination = { page: 1, size: LEADS_PAGE_SIZE, total: 0, totalPages: 0 };
    var ordersPagination = { page: 1, size: ORDERS_PAGE_SIZE, total: 0, totalPages: 0 };
    var casesPagination = { page: 1, size: CASES_PAGE_SIZE, total: 0, totalPages: 0 };
    var DEFAULT_ADMIN_TAB = "basic-config";
    var AVAILABLE_ADMIN_TABS = ["basic-config", "config", "navigation", "background-config", "leads", "orders", "cases"];
    var BACKGROUND_CONFIG_KEY = "background_media";
    var BACKGROUND_SEQUENCE_LIMIT = 500;
    var BACKGROUND_IMAGE_ACCEPT = "image/png,image/jpeg,image/webp,image/gif,.png,.jpg,.jpeg,.webp,.gif";
    var BACKGROUND_MOBILE_MEDIA_ACCEPT = "image/png,image/jpeg,image/webp,image/gif,video/mp4,video/quicktime,video/webm,video/ogg,.png,.jpg,.jpeg,.webp,.gif,.mp4,.mov,.m4v,.webm,.ogg";

    function syncAdminOverlayState() {
      document.body.classList.toggle("admin-modal-open", !!activeAdminModalId || activeAdminImagePreview);
    }

    function getPreviewLabel(label, fallback) {
      return String(label || fallback || "图片预览").trim() || "图片预览";
    }

    function normalizePreviewItems(items) {
      return (Array.isArray(items) ? items : []).map(function (item) {
        if (!item) return null;
        if (typeof item === "string") {
          var url = String(item || "").trim();
          return url ? { url: url, label: "" } : null;
        }
        var nextUrl = String(item.url || item.src || "").trim();
        if (!nextUrl) return null;
        return {
          url: nextUrl,
          label: getPreviewLabel(item.label || item.alt || "", "")
        };
      }).filter(Boolean);
    }

    function setPreviewGroupItems(groupKey, items) {
      var safeKey = String(groupKey || "").trim();
      if (!safeKey) return;
      adminImagePreviewGroups[safeKey] = normalizePreviewItems(items);
    }

    function getPreviewGroupItems(groupKey) {
      var safeKey = String(groupKey || "").trim();
      return safeKey && adminImagePreviewGroups[safeKey] ? adminImagePreviewGroups[safeKey].slice() : [];
    }

    function getActivePreviewItem() {
      if (!activeAdminImagePreviewItems.length) return null;
      if (activeAdminImagePreviewIndex < 0 || activeAdminImagePreviewIndex >= activeAdminImagePreviewItems.length) {
        activeAdminImagePreviewIndex = 0;
      }
      return activeAdminImagePreviewItems[activeAdminImagePreviewIndex] || null;
    }

    function renderAdminImagePreview() {
      var preview = document.getElementById("adminImagePreview");
      var img = document.getElementById("adminImagePreviewImg");
      var caption = document.getElementById("adminImagePreviewCaption");
      var counter = document.getElementById("adminImagePreviewCounter");
      var prevBtn = document.getElementById("adminImagePreviewPrevBtn");
      var nextBtn = document.getElementById("adminImagePreviewNextBtn");
      var current = getActivePreviewItem();
      var total = activeAdminImagePreviewItems.length;
      var hasGallery = total > 1;
      if (!preview || !img || !current) return;
      img.src = current.url;
      img.alt = getPreviewLabel(current.label, "图片预览");
      if (caption) {
        var text = String(current.label || "").trim();
        caption.textContent = text;
        caption.style.display = text ? "" : "none";
      }
      if (counter) {
        counter.textContent = hasGallery ? (activeAdminImagePreviewIndex + 1) + " / " + total : "";
        counter.style.display = hasGallery ? "" : "none";
      }
      if (prevBtn) {
        prevBtn.style.display = hasGallery ? "" : "none";
        prevBtn.disabled = !hasGallery;
      }
      if (nextBtn) {
        nextBtn.style.display = hasGallery ? "" : "none";
        nextBtn.disabled = !hasGallery;
      }
    }

    function stepAdminImagePreview(delta) {
      if (!activeAdminImagePreview || activeAdminImagePreviewItems.length <= 1) return;
      var total = activeAdminImagePreviewItems.length;
      activeAdminImagePreviewIndex = (activeAdminImagePreviewIndex + delta + total) % total;
      renderAdminImagePreview();
    }

    function handlePreviewableImageActivate(event) {
      var trigger = event.currentTarget;
      var previewUrl = trigger.getAttribute("data-image-preview-src") || "";
      var previewLabel = getPreviewLabel(trigger.getAttribute("data-image-preview-alt"), trigger.getAttribute("alt"));
      var previewGroup = trigger.getAttribute("data-image-preview-group") || "";
      var previewIndex = Number(trigger.getAttribute("data-image-preview-index"));
      var groupItems = getPreviewGroupItems(previewGroup);
      if (!previewUrl) return;
      event.preventDefault();
      event.stopPropagation();
      openAdminImagePreview(previewUrl, previewLabel, trigger, {
        items: groupItems,
        index: isFinite(previewIndex) ? previewIndex : 0
      });
    }

    function bindPreviewableImage(img) {
      if (!img || img.getAttribute("data-preview-bound") === "1") return;
      img.setAttribute("data-preview-bound", "1");
      img.addEventListener("click", handlePreviewableImageActivate);
      img.addEventListener("keydown", function (event) {
        if (event.key !== "Enter" && event.key !== " ") return;
        handlePreviewableImageActivate(event);
      });
    }

    function setPreviewableImage(img, url, label, options) {
      if (!img) return;
      var opts = options || {};
      var previewUrl = String(url || "").trim();
      if (previewUrl) {
        img.classList.add("admin-previewable-image");
        img.setAttribute("data-image-preview-src", previewUrl);
        img.setAttribute("data-image-preview-alt", getPreviewLabel(label, img.getAttribute("alt")));
        img.setAttribute("tabindex", "0");
        img.setAttribute("role", "button");
        img.setAttribute("aria-label", "查看大图：" + getPreviewLabel(label, img.getAttribute("alt")));
        if (opts.galleryKey) {
          img.setAttribute("data-image-preview-group", String(opts.galleryKey));
          img.setAttribute("data-image-preview-index", String(Number(opts.galleryIndex) || 0));
          if (opts.galleryItems) setPreviewGroupItems(opts.galleryKey, opts.galleryItems);
        } else {
          img.removeAttribute("data-image-preview-group");
          img.removeAttribute("data-image-preview-index");
        }
        bindPreviewableImage(img);
      } else {
        img.classList.remove("admin-previewable-image");
        img.removeAttribute("data-image-preview-src");
        img.removeAttribute("data-image-preview-alt");
        img.removeAttribute("data-image-preview-group");
        img.removeAttribute("data-image-preview-index");
        img.removeAttribute("tabindex");
        img.removeAttribute("role");
        img.removeAttribute("aria-label");
      }
    }

    function openAdminImagePreview(url, label, triggerEl, options) {
      var preview = document.getElementById("adminImagePreview");
      if (!preview) return;
      var opts = options || {};
      var previewUrl = String(url || "").trim();
      if (!previewUrl) return;
      var items = normalizePreviewItems(opts.items);
      var matchedIndex = items.findIndex(function (item) { return item.url === previewUrl; });
      if (!items.length) {
        items = [{ url: previewUrl, label: getPreviewLabel(label, "图片预览") }];
        activeAdminImagePreviewIndex = 0;
      } else if (matchedIndex >= 0) {
        activeAdminImagePreviewIndex = matchedIndex;
      } else {
        var fallbackIndex = Number(opts.index);
        activeAdminImagePreviewIndex = isFinite(fallbackIndex) && fallbackIndex >= 0 && fallbackIndex < items.length ? fallbackIndex : 0;
      }
      activeAdminImagePreviewItems = items;
      activeAdminImagePreview = true;
      lastImagePreviewTriggerEl = triggerEl || document.activeElement;
      preview.classList.add("open");
      preview.setAttribute("aria-hidden", "false");
      syncAdminOverlayState();
      renderAdminImagePreview();
      setTimeout(function () {
        var closeBtn = document.getElementById("adminImagePreviewCloseBtn");
        if (closeBtn && closeBtn.focus) closeBtn.focus();
      }, 0);
    }

    function closeAdminImagePreview() {
      if (!activeAdminImagePreview) return;
      var preview = document.getElementById("adminImagePreview");
      var img = document.getElementById("adminImagePreviewImg");
      var caption = document.getElementById("adminImagePreviewCaption");
      var counter = document.getElementById("adminImagePreviewCounter");
      if (preview) {
        preview.classList.remove("open");
        preview.setAttribute("aria-hidden", "true");
      }
      if (img) {
        img.removeAttribute("src");
        img.alt = "图片预览";
      }
      if (caption) {
        caption.textContent = "";
        caption.style.display = "none";
      }
      if (counter) {
        counter.textContent = "";
        counter.style.display = "none";
      }
      activeAdminImagePreviewItems = [];
      activeAdminImagePreviewIndex = 0;
      activeAdminImagePreview = false;
      syncAdminOverlayState();
      var returnEl = lastImagePreviewTriggerEl;
      lastImagePreviewTriggerEl = null;
      if (returnEl && returnEl.focus) {
        setTimeout(function () {
          try { returnEl.focus(); } catch (e) { }
        }, 0);
      }
    }

    function openAdminModal(modalId, triggerEl) {
      var backdrop = document.getElementById("adminModalBackdrop");
      var modal = document.getElementById(modalId);
      if (!backdrop || !modal) return;
      closeAdminModal("switch");
      activeAdminModalId = modalId;
      lastModalTriggerEl = triggerEl || document.activeElement;
      backdrop.classList.add("open");
      modal.classList.add("open");
      syncAdminOverlayState();
      setTimeout(function () {
        var focusEl = modal.querySelector("input,textarea,select,button");
        if (focusEl && focusEl.focus) focusEl.focus();
        else if (modal.focus) modal.focus();
      }, 0);
    }

    function closeAdminModal() {
      if (!activeAdminModalId) return;
      var backdrop = document.getElementById("adminModalBackdrop");
      var modal = document.getElementById(activeAdminModalId);
      if (modal) modal.classList.remove("open");
      if (backdrop) backdrop.classList.remove("open");
      var returnEl = lastModalTriggerEl;
      activeAdminModalId = null;
      lastModalTriggerEl = null;
      syncAdminOverlayState();
      if (returnEl && returnEl.focus) setTimeout(function () { try { returnEl.focus(); } catch (e) { } }, 0);
    }

    function getStoredAdminToken() {
      try { return sessionStorage.getItem(ADMIN_TOKEN_STORAGE_KEY) || ""; } catch (e) { return ""; }
    }

    function setStoredAdminToken(token) {
      try {
        if (token) sessionStorage.setItem(ADMIN_TOKEN_STORAGE_KEY, token);
        else sessionStorage.removeItem(ADMIN_TOKEN_STORAGE_KEY);
      } catch (e) { }
    }

    function isValidAdminTab(tab) {
      return AVAILABLE_ADMIN_TABS.indexOf(tab) !== -1;
    }

    function getStoredAdminTab() {
      try {
        var saved = sessionStorage.getItem(ADMIN_ACTIVE_TAB_STORAGE_KEY) || "";
        return isValidAdminTab(saved) ? saved : DEFAULT_ADMIN_TAB;
      } catch (e) {
        return DEFAULT_ADMIN_TAB;
      }
    }

    function setStoredAdminTab(tab) {
      try {
        if (isValidAdminTab(tab)) sessionStorage.setItem(ADMIN_ACTIVE_TAB_STORAGE_KEY, tab);
        else sessionStorage.removeItem(ADMIN_ACTIVE_TAB_STORAGE_KEY);
      } catch (e) { }
    }

    function getStoredNavigationSection() {
      try {
        return sessionStorage.getItem(ADMIN_NAV_SECTION_STORAGE_KEY) || "home";
      } catch (e) {
        return "home";
      }
    }

    function setStoredNavigationSection(section) {
      try {
        if (section) sessionStorage.setItem(ADMIN_NAV_SECTION_STORAGE_KEY, section);
        else sessionStorage.removeItem(ADMIN_NAV_SECTION_STORAGE_KEY);
      } catch (e) { }
    }

    function getStoredBackgroundSection() {
      try {
        var saved = sessionStorage.getItem(ADMIN_BG_SECTION_STORAGE_KEY) || "main";
        return saved === "sequence" ? "main" : saved;
      } catch (e) {
        return "main";
      }
    }

    function setStoredBackgroundSection(section) {
      try {
        if (section) sessionStorage.setItem(ADMIN_BG_SECTION_STORAGE_KEY, section);
        else sessionStorage.removeItem(ADMIN_BG_SECTION_STORAGE_KEY);
      } catch (e) { }
    }

    function setAdminTitle(companyName) {
      var name = (companyName || "").trim();
      var title = (name ? name : "VIDream") + "管理后台";
      var el = document.getElementById("adminTitle");
      if (el) el.textContent = title;
      document.title = title;
    }

    function resolveCompanyLogo(url, fallback) {
      var value = (url || "").trim();
      return value || fallback || "/images/vidream.png";
    }

    function setAdminBrand(config) {
      var data = config || {};
      var logo = document.querySelector(".admin-logo");
      if (logo) {
        logo.src = resolveCompanyLogo(data.company_logo, logo.getAttribute("src"));
      }
      setAdminTitle(data.company_name);
    }

    function updateAdminConfigCache(patch) {
      adminConfigCache = Object.assign({}, adminConfigCache, patch || {});
      setAdminBrand(adminConfigCache);
    }

    function fetchAdminConfig(onSuccess) {
      return api("/api/admin/config").then(function (res) {
        if (!res.success) return;
        adminConfigCache = res.data || {};
        setAdminBrand(adminConfigCache);
        if (typeof onSuccess === "function") onSuccess(adminConfigCache);
      });
    }

    function showToast(msg, type) {
      var t = document.createElement("div");
      t.className = "toast toast-" + (type || "success");
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(function () { t.remove(); }, 2500);
    }

    function api(path, method, body) {
      var opts = {
        method: method || "GET",
        headers: { "Content-Type": "application/json", "Accept": "application/json", "X-Admin-Token": adminToken },
      };
      if (body !== undefined && body !== null) opts.body = JSON.stringify(body);
      return fetch(path, opts).then(function (r) {
        return r.text().then(function (t) {
          if (!r.ok) {
            var parsed = null;
            try { parsed = JSON.parse(t || "{}"); } catch (e) { parsed = null; }
            var msg = (parsed && parsed.message) ? parsed.message : ("HTTP " + r.status + (r.statusText ? (" " + r.statusText) : ""));
            if (!(parsed && parsed.message) && t && t.trim()) msg = msg + ": " + t.trim().slice(0, 200);
            return { success: false, message: msg, status: r.status };
          }
          try { return JSON.parse(t || "{}"); } catch (e) { return { success: false, message: "响应解析失败" }; }
        });
      }).catch(function () {
        return { success: false, message: "网络请求失败" };
      });
    }

    function apiForm(path, method, formData) {
      var opts = {
        method: method || "POST",
        headers: { "Accept": "application/json", "X-Admin-Token": adminToken },
        body: formData,
      };
      return fetch(path, opts).then(function (r) {
        return r.text().then(function (t) {
          if (!r.ok) {
            var parsed = null;
            try { parsed = JSON.parse(t || "{}"); } catch (e) { parsed = null; }
            var msg = (parsed && parsed.message) ? parsed.message : ("HTTP " + r.status + (r.statusText ? (" " + r.statusText) : ""));
            if (!(parsed && parsed.message) && t && t.trim()) msg = msg + ": " + t.trim().slice(0, 200);
            return { success: false, message: msg, status: r.status };
          }
          try { return JSON.parse(t || "{}"); } catch (e) { return { success: false, message: "响应解析失败" }; }
        });
      }).catch(function () {
        return { success: false, message: "网络请求失败" };
      });
    }

    function uploadImage(file, category) {
      var fd = new FormData();
      fd.append("file", file);
      fd.append("category", category || "");
      return apiForm("/api/admin/images/upload", "POST", fd);
    }

    function deleteConfigImage(configKey, imageUrl) {
      return api("/api/admin/images/delete", "POST", {
        configKey: configKey || "",
        imageUrl: imageUrl || ""
      });
    }

    function showAdminConfirm(options) {
      options = options || {};
      confirmModalAction = typeof options.onConfirm === "function" ? options.onConfirm : null;
      confirmModalSubmitting = false;
      var titleEl = document.getElementById("adminConfirmTitle");
      var msgEl = document.getElementById("adminConfirmMessage");
      var submitBtn = document.getElementById("adminConfirmSubmitBtn");
      var cancelBtn = document.getElementById("adminConfirmCancelBtn");
      if (titleEl) titleEl.textContent = options.title || "操作确认";
      if (msgEl) msgEl.textContent = options.message || "确定继续执行该操作吗？";
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.textContent = options.confirmText || "确定";
      }
      if (cancelBtn) cancelBtn.disabled = false;
      openAdminModal("adminConfirmModal", options.triggerEl);
    }

    function cancelAdminConfirm(forceClose) {
      if (confirmModalSubmitting && !forceClose) return;
      confirmModalSubmitting = false;
      confirmModalAction = null;
      var submitBtn = document.getElementById("adminConfirmSubmitBtn");
      var cancelBtn = document.getElementById("adminConfirmCancelBtn");
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.textContent = "确定";
      }
      if (cancelBtn) cancelBtn.disabled = false;
      closeAdminModal();
    }

    function confirmAdminConfirm() {
      if (!confirmModalAction || confirmModalSubmitting) return;
      confirmModalSubmitting = true;
      var submitBtn = document.getElementById("adminConfirmSubmitBtn");
      var cancelBtn = document.getElementById("adminConfirmCancelBtn");
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = "处理中...";
      }
      if (cancelBtn) cancelBtn.disabled = true;
      Promise.resolve(confirmModalAction()).catch(function () {
      }).finally(function () {
        confirmModalSubmitting = false;
        if (activeAdminModalId === "adminConfirmModal") {
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.textContent = "确定";
          }
          if (cancelBtn) cancelBtn.disabled = false;
        }
      });
    }

    function parseJSONSafe(str, fallback) {
      if (!str) return fallback;
      try { return JSON.parse(str); } catch (e) { return fallback; }
    }

    function ensureFormFieldWrap(fieldEl) {
      if (!fieldEl) return null;
      var row = fieldEl.closest(".form-row");
      if (!row) return null;
      if (fieldEl.parentElement && fieldEl.parentElement.classList && fieldEl.parentElement.classList.contains("form-field")) {
        return fieldEl.parentElement;
      }
      var wrap = document.createElement("div");
      wrap.className = "form-field";
      row.insertBefore(wrap, fieldEl);
      wrap.appendChild(fieldEl);
      return wrap;
    }

    function enhanceConfigUploadUI(formSelector, options) {
      var opts = options || {};
      (opts.singleUploads || []).forEach(function (item) {
        bindSingleConfigImageUpload(formSelector, item.key, item.category);
      });

        if (objectUrl) {

        selectedFile = f || null;

          onConfirm: function () {

            deleteBtn.textContent = "删除中...";
            return deleteConfigImage(key, currentUrl).then(function (res) {
              if (res && res.success) {
                inputEl.value = "";

                setCardToUrl("");
                showToast("图片已删除");
                cancelAdminConfirm(true);
              } else {
                showToast((res && res.message) ? res.message : "删除失败", "error");
              }

              showToast("删除失败", "error");

        if (selectedFile) return;
        setCardToUrl(inputEl.value || "");
      });

    function bindPartnerLogosUpload(formSelector) {
      var textarea = document.querySelector(formSelector + ' textarea[data-key="partner_logos"]');
      if (!textarea) return;
      var row = textarea.closest(".form-row");
      if (!row) return;
      if (row.getAttribute("data-partner-upload-enhanced") === "1") return;
      row.setAttribute("data-partner-upload-enhanced", "1");

      var wrap = ensureFormFieldWrap(textarea);
      if (!wrap) return;

      var uploader = document.createElement("div");
      uploader.className = "config-image-uploader";

      var card = document.createElement("div");
      card.className = "config-image-card";

      var placeholder = document.createElement("div");
      placeholder.className = "config-image-placeholder";
      placeholder.textContent = "暂无封面";

      var img = document.createElement("img");
      img.alt = "partner_logos";

      var fileEl = document.createElement("input");
      fileEl.type = "file";
      fileEl.accept = "image/*";
      fileEl.multiple = true;
      fileEl.style.display = "none";

      var actions = document.createElement("div");
      actions.className = "config-image-actions";

      var uploadBtn = document.createElement("button");
      uploadBtn.type = "button";
      uploadBtn.className = "btn btn-sm btn-primary";
      uploadBtn.textContent = "上传图片";

      actions.appendChild(uploadBtn);

      var gallery = document.createElement("div");
      gallery.className = "config-image-gallery";

      card.appendChild(placeholder);
      card.appendChild(img);

      uploader.appendChild(card);
      uploader.appendChild(fileEl);
      uploader.appendChild(actions);
      uploader.appendChild(gallery);
      wrap.appendChild(uploader);

      var selectedFiles = [];
      var objectUrl = "";

      function getExistingPartners() {
        var existing = parseJSONSafe(textarea.value, []);
        if (!Array.isArray(existing)) existing = [];
        return existing;
      }

      function renderGallery() {
        var existing = getExistingPartners();
        var previewItems = existing.map(function (item, index) {
          var itemUrl = item && (item.image_url || item.url || item.imageUrl);
          return itemUrl ? {
            url: itemUrl,
            label: (item && item.name) ? item.name : ("合作伙伴" + (index + 1))
          } : null;
        }).filter(Boolean);
        gallery.innerHTML = "";
        existing.forEach(function (it) {
          var url = it && (it.image_url || it.url || it.imageUrl);
          if (!url) return;
          var item = document.createElement("div");
          item.className = "config-image-thumb-item";
          var thumb = document.createElement("div");
          thumb.className = "config-image-thumb";
          var im = document.createElement("img");
          im.alt = (it && it.name) ? it.name : "partner";
          im.src = url;
          setPreviewableImage(im, url, im.alt, {
            galleryKey: "partner-upload-gallery",
            galleryItems: previewItems,
            galleryIndex: previewItems.findIndex(function (item) { return item.url === url; })
          });
          thumb.appendChild(im);

          var actionsWrap = document.createElement("div");
          actionsWrap.className = "config-image-thumb-actions";
          var removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.className = "btn btn-sm btn-danger";
          removeBtn.textContent = "删除";
          removeBtn.addEventListener("click", function () {
            showAdminConfirm({
              title: "删除合作伙伴图片",
              message: "确定删除这张合作伙伴图片吗？删除后将同时移除服务器文件。",
              confirmText: "确定删除",
              triggerEl: removeBtn,
              onConfirm: function () {
                removeBtn.disabled = true;
                removeBtn.textContent = "删除中...";
                return deleteConfigImage("partner_logos", url).then(function (res) {
                  if (res && res.success) {
                    var next = getExistingPartners().filter(function (entry) {
                      var entryUrl = entry && (entry.image_url || entry.url || entry.imageUrl);
                      return entryUrl !== url;
                    });
                    textarea.value = JSON.stringify(next);
                    textarea.dispatchEvent(new Event("input"));
                    showToast("图片已删除");
                    cancelAdminConfirm(true);
                  } else {
                    showToast((res && res.message) ? res.message : "删除失败", "error");
                  }
                }).catch(function () {
                  showToast("删除失败", "error");
                }).finally(function () {
                  removeBtn.disabled = false;
                  removeBtn.textContent = "删除";
                });
              }
            });
          });
          actionsWrap.appendChild(removeBtn);

          item.appendChild(thumb);
          item.appendChild(actionsWrap);
          gallery.appendChild(item);
        });
        var isFull = existing.length >= PARTNER_LOGO_LIMIT;
        actions.style.display = isFull ? "none" : "";
        card.style.display = isFull ? "none" : "";
      }

      function setCardToFile(f) {
        if (objectUrl) {
          try { URL.revokeObjectURL(objectUrl); } catch (e) { }
          objectUrl = "";
        }
        if (f) {
          objectUrl = URL.createObjectURL(f);
          img.src = objectUrl;
          img.style.display = "block";
          placeholder.style.display = "none";
          card.classList.add("is-filled");
          setPreviewableImage(img, objectUrl, "合作伙伴 Logo");
        } else {
          img.removeAttribute("src");
          img.style.display = "none";
          placeholder.style.display = "block";
          card.classList.remove("is-filled");
          setPreviewableImage(img, "", "");
        }
      }

      img.addEventListener("error", function () {
        img.style.display = "none";
        placeholder.style.display = "block";
        card.classList.remove("is-filled");
      });

      card.addEventListener("click", function (event) {
        if (event.target === img && img.getAttribute("data-image-preview-src")) return;
        if (card.classList.contains("is-filled")) return;
        fileEl.click();
      });

      function triggerUpload() {
        if (!selectedFiles || selectedFiles.length === 0) {
          showToast("请选择图片文件", "error");
          return;
        }
        uploadBtn.disabled = true;
        uploadBtn.textContent = "上传中...";

        var existing = getExistingPartners();
        var files = selectedFiles.slice();
        var chain = Promise.resolve();
        files.forEach(function (f) {
          chain = chain.then(function () {
            return uploadImage(f, "partners").then(function (res) {
              if (res && res.success && res.data && res.data.url) {
                var name = (f.name || "").replace(/\.[^/.]+$/, "");
                existing.push({ name: name || "合作伙伴", image_url: res.data.url });
                textarea.value = JSON.stringify(existing);
                textarea.dispatchEvent(new Event("input"));
                renderGallery();
              } else {
                throw new Error((res && res.message) ? res.message : "上传失败");
              }
            });
          });
        });

        chain.then(function () {
          showToast("已追加到 partner_logos");
          selectedFiles = [];
          fileEl.value = "";
          setCardToFile(null);
        }).catch(function (e) {
          showToast(e && e.message ? e.message : "上传失败", "error");
          uploadBtn.disabled = false;
        }).finally(function () {
          uploadBtn.textContent = "上传图片";
          uploadBtn.disabled = false;
        });
      }

      fileEl.addEventListener("change", function () {
        var existingCount = getExistingPartners().length;
        var remaining = Math.max(0, PARTNER_LOGO_LIMIT - existingCount);
        var pickedFiles = fileEl.files ? Array.prototype.slice.call(fileEl.files) : [];
        if (remaining <= 0) {
          selectedFiles = [];
          fileEl.value = "";
          setCardToFile(null);
          showToast("最多可上传九个合作伙伴", "error");
          return;
        }
        if (pickedFiles.length > remaining) {
          selectedFiles = pickedFiles.slice(0, remaining);
          showToast("最多可上传九个合作伙伴，已为你截取前" + remaining + "张", "error");
        } else {
          selectedFiles = pickedFiles;
        }
        setCardToFile(selectedFiles[0] || null);
        if (selectedFiles.length > 0) triggerUpload();
      });

      uploadBtn.addEventListener("click", function () {
        fileEl.click();
      });

      textarea.addEventListener("input", function () {
        renderGallery();
      });

      renderGallery();
      setCardToFile(null);
    }

    function cloneValue(value) {
      return JSON.parse(JSON.stringify(value));

    function normalizeTextList(items, fallback) {
      var list = Array.isArray(items) ? items : (fallback || []);
      return list.map(function (item) {
        return String(item || "").trim();
      }).filter(Boolean);
    }

    function normalizeEditableTextList(items, fallback) {
      var list = Array.isArray(items) && items.length ? items : (fallback || []);
      return list.map(function (item) {
        return String(item || "").trim();
      });
    }

    function normalizeNavigationItems(items) {
      return DEFAULT_NAVIGATION_ITEMS.map(function (item, index) {
        var current = Array.isArray(items) ? (items[index] || {}) : {};
        return {
          slot: item.slot,
          name: String(current.name || item.name).trim() || item.name,
          anchor: String(current.anchor || item.anchor).trim() || item.anchor,
          title: String(current.title || current.name || item.title).trim() || item.title
        };
      });
    }

    function normalizeCardList(items, fallback) {
      var list = Array.isArray(items) && items.length ? items : (fallback || []);
      return list.map(function (item) {
        return {
          title: String((item && item.title) || "").trim(),
          content: String((item && item.content) || "").trim()
        };
      }).filter(function (item) {
        return item.title || item.content;
      });
    }

    function normalizeEditableCardList(items, fallback) {
      var list = Array.isArray(items) && items.length ? items : (fallback || []);
      return list.map(function (item) {
        return {
          title: String((item && item.title) || "").trim(),
          content: String((item && item.content) || "").trim()
        };
      });
    }

    function normalizePartnerLogos(items) {
      var list = Array.isArray(items) ? items : [];
      return list.map(function (item) {
        var rawName = String((item && (item.name || item.title)) || "").trim();
        return {
          name: rawName,
          image_url: String((item && (item.image_url || item.url || item.imageUrl)) || "").trim()
        };
      }).filter(function (item) {
        return !!item.image_url;
      });
    }

    function normalizeContactFields(items) {
      return DEFAULT_CONTACT_FIELDS.map(function (field) {
        var current = Array.isArray(items)
          ? items.filter(function (item) { return item && item.key === field.key; })[0]
          : null;
        return {
          key: field.key,
          label: String((current && current.label) || field.label),
          type: String((current && current.type) || field.type),
          required: current && typeof current.required === "boolean" ? current.required : field.required,
          placeholder: String((current && current.placeholder) || field.placeholder || ""),
          options: normalizeTextList(current && current.options, field.options || [])
        };
      });
    }

    function normalizeContactFieldsPayload(rawFields, rawDramaTypes) {
      var parsedFields = Array.isArray(rawFields) ? rawFields : parseJSONSafe(rawFields, null);
      var normalized = normalizeContactFields(Array.isArray(parsedFields) ? parsedFields : []);
      if (Array.isArray(parsedFields) && parsedFields.length) {
        return normalized;
      }
      var legacyDramaTypes = Array.isArray(rawDramaTypes) ? rawDramaTypes : parseJSONSafe(rawDramaTypes, []);
      var dramaOptions = normalizeTextList(legacyDramaTypes, []);
      if (!dramaOptions.length) {
        return normalized;
      }
      return normalized.map(function (field) {
        if (field.key !== "dramaTypes") {
          return field;
        }
        return {
          key: field.key,
          label: field.label,
          type: field.type,
          required: field.required,
          placeholder: field.placeholder,
          options: dramaOptions
        };
      });
    }

    function extractDramaTypesFromContactFields(items) {
      var dramaField = Array.isArray(items)
        ? items.filter(function (item) { return item && item.key === "dramaTypes"; })[0]
        : null;
      return normalizeTextList(dramaField && dramaField.options, []);
    }

    function formatFieldOptionsForEditor(options) {
      return normalizeTextList(options, []).join(", ");
    }

      });

    function bindSimpleListEditor(containerId, hiddenSelector, maxItems, itemLabel, helpSelector, layoutMode) {
      var container = document.getElementById(containerId);
      var hidden = document.querySelector(hiddenSelector);
      var help = helpSelector ? document.querySelector(helpSelector) : null;
      if (!container || !hidden) return;
      var configKey = hidden.getAttribute("data-key") || "";

      function read() {
        return normalizeEditableTextList(parseJSONSafe(hidden.value, []), []);
      }

      function write(items) {
        hidden.value = JSON.stringify(items);
        hidden.dispatchEvent(new Event("input"));
      }

      function persist(items, successMessage) {
        if (!configKey) {
          write(items);
          return Promise.resolve({ success: true });
        }
        var payloadValue = JSON.stringify(items);
        return api("/api/admin/config", "PUT", (function () {
          var patch = {};
          patch[configKey] = payloadValue;
          return patch;
        })()).then(function (res) {
          if (res && res.success) {
            write(items);
            updateAdminConfigCache((function () {
              var patch = {};
              patch[configKey] = payloadValue;
              return patch;
            })());
            if (successMessage) showToast(successMessage, "success");
          } else {
            showToast((res && res.message) || "保存失败", "error");
          }
          return res;
        }).catch(function () {
          showToast("保存失败", "error");
          return { success: false, message: "保存失败" };
        });
      }

      function render() {
        var items = read();
        container.innerHTML = "";
        if (help) {
          help.style.display = items.length < maxItems ? "" : "none";
        }
        items.forEach(function (item, index) {
          var card = document.createElement("div");
          if (layoutMode === "inline") {
            card.className = "config-list-item config-list-item-inline";
            card.innerHTML =
              '<div class="config-list-item-title">' + escapeHTML(itemLabel + ' ' + (index + 1)) + '</div>' +
              '<input data-item-index="' + index + '" value="' + escapeHTML(item) + '" placeholder="\u8bf7\u8f93\u5165\u6587\u6848">' +
              '<button type="button" class="btn btn-sm btn-danger" data-remove-index="' + index + '">\u5220\u9664</button>';
          } else {
            card.className = "config-list-item";
            card.innerHTML =
              '<div class="config-list-item-head"><div class="config-list-item-title">' + escapeHTML(itemLabel + ' ' + (index + 1)) + '</div><button type="button" class="btn btn-sm btn-danger" data-remove-index="' + index + '">\u5220\u9664</button></div>' +
              '<input data-item-index="' + index + '" value="' + escapeHTML(item) + '" placeholder="\u8bf7\u8f93\u5165\u6587\u6848">';
          }
          container.appendChild(card);
        });

        if (items.length < maxItems) {
          var addBtn = document.createElement("button");
          addBtn.type = "button";
          addBtn.className = "btn btn-sm btn-primary config-add-btn";
          addBtn.textContent = '\u65b0\u589e' + itemLabel;
          addBtn.addEventListener("click", function () {
            var next = read();
            if (next.length >= maxItems) return;
            next.push("");
            write(next);
            render();
          });
          container.appendChild(addBtn);
        }

        container.querySelectorAll("[data-item-index]").forEach(function (input) {
          input.addEventListener("input", function () {
            var next = read();
            next[Number(input.getAttribute("data-item-index"))] = input.value;
            write(next);
          });
        });

        container.querySelectorAll("[data-remove-index]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var idx = Number(btn.getAttribute("data-remove-index"));
            showAdminConfirm({
              title: "删除" + itemLabel,
              message: "确定删除当前" + itemLabel + "吗？删除后将立即从导航配置中移除。",
              confirmText: "确定删除",
              triggerEl: btn,
              onConfirm: function () {
                var next = read();
                next.splice(idx, 1);
                return persist(next, itemLabel + "已删除").then(function (res) {
                  if (res && res.success) {
                    render();
                    cancelAdminConfirm(true);
                  }
                });
              }
            });
          });
        });
      }

      render();
    }

    function bindCardListEditor(containerId, hiddenSelector, helpSelector, itemLabel) {
      var container = document.getElementById(containerId);
      var hidden = document.querySelector(hiddenSelector);
      var help = helpSelector ? document.querySelector(helpSelector) : null;
      if (!container || !hidden) return;
      var configKey = hidden.getAttribute("data-key") || "";
      var label = itemLabel || "卡片";
      var editingIndex = -1;
      var editingDraft = null;
      var editingIsNew = false;
      var cardLimit = 3;

      function read() {
        return normalizeEditableCardList(parseJSONSafe(hidden.value, []), []);
      }

      function write(items) {
        hidden.value = JSON.stringify(items);
        hidden.dispatchEvent(new Event("input"));
      }

      function persist(items, successMessage) {
        if (!configKey) {
          write(items);
          return Promise.resolve({ success: true });
        }
        var normalized = normalizeCardList(items, []);
        var payloadValue = JSON.stringify(normalized);
        return api("/api/admin/config", "PUT", (function () {
          var patch = {};
          patch[configKey] = payloadValue;
          return patch;
        })()).then(function (res) {
          if (res && res.success) {
            write(normalized);
            updateAdminConfigCache((function () {
              var patch = {};
              patch[configKey] = payloadValue;
              return patch;
            })());
            if (successMessage) showToast(successMessage, "success");
          } else {
            showToast((res && res.message) || "保存失败", "error");
          }
          return res;
        }).catch(function () {
          showToast("保存失败", "error");
          return { success: false, message: "保存失败" };
        });
      }

      function startEdit(index, isNew) {
        var items = read();
        var current = items[index] || { title: "", content: "" };
        editingIndex = index;
        editingIsNew = !!isNew;
        editingDraft = {
          title: current.title || "",
          content: current.content || ""
        };
        render();
      }

      function stopEdit(shouldCleanupNewRow) {
        if (shouldCleanupNewRow && editingIsNew && editingIndex > -1) {
          var items = read();
          if (items[editingIndex] && !items[editingIndex].title && !items[editingIndex].content) {
            items.splice(editingIndex, 1);
            write(items);
          }
        }
        editingIndex = -1;
        editingDraft = null;
        editingIsNew = false;
      }

      function bindDraftInputs() {
        var titleInput = container.querySelector("[data-card-edit-title]");
        var contentInput = container.querySelector("[data-card-edit-content]");
        if (titleInput) {
          titleInput.addEventListener("input", function () {
            if (!editingDraft) return;
            editingDraft.title = titleInput.value;
          });
        }
        if (contentInput) {
          contentInput.addEventListener("input", function () {
            if (!editingDraft) return;
            editingDraft.content = contentInput.value;
          });
        }
      }

      function render() {
        var items = read();
        container.innerHTML = "";
        if (help) {
          help.style.display = items.length < cardLimit ? "" : "none";
        }

        var shell = document.createElement("div");
        shell.className = "partner-logo-editor-shell";

        var head = document.createElement("div");
        head.className = "partner-logo-editor-head";
        head.innerHTML =
          '<div class="partner-logo-editor-title"><div class="config-help">\u8868\u683c\u6700\u591a\u53ef\u7ef4\u62a4\u4e09\u4e2a' + escapeHTML(label) + formatEditorCount(items.length, cardLimit) + '</div></div>';
        var tools = document.createElement("div");
        tools.className = "partner-logo-table-actions";
        if (items.length < cardLimit) {
          var addBtn = document.createElement("button");
          addBtn.type = "button";
          addBtn.className = "btn btn-sm btn-primary";
          addBtn.textContent = "\u65b0\u589e\u5361\u7247";
          addBtn.disabled = editingIndex > -1;
          addBtn.addEventListener("click", function () {
            var next = read();
            if (next.length >= cardLimit || editingIndex > -1) return;
            next.push({ title: "", content: "" });
            write(next);
            startEdit(next.length - 1, true);
          });
          tools.appendChild(addBtn);
        }
        head.appendChild(tools);
        shell.appendChild(head);

        var tableWrap = document.createElement("div");
        tableWrap.className = "config-card-table-wrap";
        var html = '<table class="config-card-table"><thead><tr><th>\u6807\u9898</th><th>\u5185\u5bb9</th><th>\u64cd\u4f5c</th></tr></thead><tbody>';
        if (items.length) {
          items.forEach(function (item, index) {
            var isEditing = index === editingIndex;
            var rowItem = isEditing && editingDraft ? editingDraft : item;
            html += "<tr>";
            html += '<td>' + (
              isEditing
                ? '<div class="config-inline-field"><label>\u6807\u9898</label><input data-card-edit-title value="' + escapeHTML(rowItem.title || "") + '" placeholder="\u8bf7\u8f93\u5165\u6807\u9898"></div>'
                : '<div class="config-card-cell-text' + (rowItem.title ? "" : " config-card-cell-empty") + '">' + escapeHTML(rowItem.title || "\u672a\u586b\u5199") + "</div>"
            ) + "</td>";
            html += '<td>' + (
              isEditing
                ? '<div class="config-inline-field"><label>\u5185\u5bb9</label><textarea data-card-edit-content placeholder="\u8bf7\u8f93\u5165\u5185\u5bb9">' + escapeHTML(rowItem.content || "") + "</textarea></div>"
                : '<div class="config-card-cell-text' + (rowItem.content ? "" : " config-card-cell-empty") + '">' + escapeHTML(rowItem.content || "\u672a\u586b\u5199") + "</div>"
            ) + "</td>";
            html += '<td><div class="config-card-table-actions">';
            if (isEditing) {
              html += '<button type="button" class="btn btn-sm btn-primary" data-save-card="' + index + '">\u5b8c\u6210</button>';
              html += '<button type="button" class="btn btn-sm btn-outline" data-cancel-card="' + index + '">\u53d6\u6d88</button>';
            } else {
              html += '<button type="button" class="btn btn-sm btn-outline" data-edit-card="' + index + '"' + (editingIndex > -1 ? " disabled" : "") + '>\u7f16\u8f91</button>';
            }
            html += '<button type="button" class="btn btn-sm btn-danger" data-remove-card="' + index + '"' + (editingIndex > -1 && !isEditing ? " disabled" : "") + '>\u5220\u9664</button>';
            html += "</div></td>";
            html += "</tr>";
          });
        } else {
          html += '<tr><td colspan="3" class="config-card-empty-row">\u6682\u65e0' + escapeHTML(label) + '\uff0c\u53ef\u70b9\u51fb\u53f3\u4e0a\u89d2\u65b0\u589e\u5361\u7247\u3002</td></tr>';
        }
        html += "</tbody></table>";
        tableWrap.innerHTML = html;
        shell.appendChild(tableWrap);
        container.appendChild(shell);

        bindDraftInputs();

        container.querySelectorAll("[data-edit-card]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var idx = Number(btn.getAttribute("data-edit-card"));
            if (editingIndex > -1) return;
            startEdit(idx, false);
          });
        });

        container.querySelectorAll("[data-save-card]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var idx = Number(btn.getAttribute("data-save-card"));
            if (!editingDraft) return;
            var next = read();
            next[idx] = {
              title: editingDraft.title || "",
              content: editingDraft.content || ""
            };
            persist(next, label + "已保存").then(function (res) {
              if (res && res.success) {
                stopEdit(false);
                render();
              }
            });
          });
        });

        container.querySelectorAll("[data-cancel-card]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            stopEdit(true);
            render();
          });
        });

        container.querySelectorAll("[data-remove-card]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            if (btn.disabled) return;
