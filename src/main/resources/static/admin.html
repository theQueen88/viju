      } else {
        tableHtml += '<tr><td colspan="10" class="table-empty-row">暂无线索数据</td></tr>';
      }
      tableHtml += '</tbody></table>';

      var paginationHtml = '<div class="table-pagination">' +
        '<div class="table-pagination-summary">共 ' + total + ' 条，每页 ' + size + ' 条，第 ' + page + ' / ' + totalPages + ' 页</div>' +
        '<div class="table-pagination-actions">' +
          '<button type="button" class="table-pagination-btn" onclick="changeLeadsPage(' + (page - 1) + ')"' + (page <= 1 ? ' disabled' : '') + '>上一页</button>' +
          pages.map(function (pageNo) {
            return '<button type="button" class="table-pagination-btn' + (pageNo === page ? ' active' : '') + '" onclick="changeLeadsPage(' + pageNo + ')">' + pageNo + '</button>';
          }).join('') +
          '<button type="button" class="table-pagination-btn" onclick="changeLeadsPage(' + (page + 1) + ')"' + (page >= totalPages ? ' disabled' : '') + '>下一页</button>' +
        '</div>' +
      '</div>';

      renderTable("leadsTable",
        '<div class="admin-table-shell">' +
          '<div class="admin-table-scroll-x">' + tableHtml + '</div>' +
          paginationHtml +
        '</div>'
      );
    }

    function changeLeadsPage(page) {
      var targetPage = Math.max(1, Number(page) || 1);
      if (leadsPagination.totalPages && targetPage > leadsPagination.totalPages) {
        targetPage = leadsPagination.totalPages;
      }
      if (targetPage === leadsPagination.page) return;
      if (leadsAllItemsCache.length) {
        renderLeadsTable(normalizeLeadsPayload(leadsAllItemsCache, targetPage, leadsFilters));
        return;
      }
      loadLeads(targetPage);
    }

    function loadLeads(page) {
      var targetPage = Math.max(1, Number(page) || leadsPagination.page || 1);
      var filters = collectLeadFilters();
      var query = buildQueryString({
        page: targetPage,
        size: LEADS_PAGE_SIZE,
        phone: filters.phone,
        startDate: filters.startDate,
        endDate: filters.endDate
      });
      api("/api/admin/leads" + query).then(function (res) {
        if (!res.success) return;
        var payload = normalizeLeadsPayload(res.data, targetPage, filters);
        if (payload.total === 0 && payload.items.length === 0) {
          leadsAllItemsCache = [];
          leadsPagination = { page: 1, size: LEADS_PAGE_SIZE, total: 0, totalPages: 0 };
          toggleListToolbar("leadsToolbar", false);
          renderNoData("leadsTable");
          return;
        }
        toggleListToolbar("leadsToolbar", true);
        renderLeadsTable(payload);
      });
    }

    function normalizeOrdersPayload(data, requestedPage, filters) {
      var targetPage = Math.max(1, Number(requestedPage) || 1);
      var allItems = filterOrderItems((data || []).slice(), filters).sort(compareOrdersByLatest);
      var total = allItems.length;
      var totalPages = total ? Math.ceil(total / ORDERS_PAGE_SIZE) : 0;
      var currentPage = totalPages ? Math.min(targetPage, totalPages) : 1;
      var start = (currentPage - 1) * ORDERS_PAGE_SIZE;
      ordersAllItemsCache = allItems;
      return {
        items: allItems.slice(start, start + ORDERS_PAGE_SIZE),
        page: currentPage,
        size: ORDERS_PAGE_SIZE,
        total: total,
        totalPages: totalPages
      };
    }

    function renderOrdersTable(data) {
      var payload = normalizeOrdersPayload(data, ordersPagination.page || 1, orderFilters);
      var orders = payload.items;
      var page = payload.page;
      var size = payload.size;
      var total = payload.total;
      var totalPages = payload.totalPages;
      var pages = totalPages ? getLeadsPageNumbers(page, totalPages) : [];
      ordersPagination = {
        page: page,
        size: size,
        total: total,
        totalPages: totalPages
      };
      ordersCache = {};

      if (total === 0) {
        toggleListToolbar("ordersToolbar", false);
        renderNoData("ordersTable");
        return;
      }
      toggleListToolbar("ordersToolbar", true);

      var html = '<table><thead><tr><th>ID</th><th>标题</th><th>预算</th><th>创建日期</th><th>截止日期</th><th>类型</th><th>状态</th><th>操作</th></tr></thead><tbody>';
      orders.forEach(function (o, index) {
        var displayIndex = (page - 1) * size + index + 1;
        ordersCache[o.id] = o;
        html += '<tr>';
        html += '<td>' + displayIndex + '</td>';
        html += '<td>' + escapeHTML(o.title) + '</td>';
        html += '<td>' + escapeHTML(o.budget || "-") + '</td>';
        html += '<td>' + escapeHTML(formatDateTimeDisplay(o.createdAt)) + '</td>';
        html += '<td>' + escapeHTML(o.deadline || "-") + '</td>';
        html += '<td>' + escapeHTML(o.dramaType || "-") + '</td>';
        html += '<td><span class="status-badge status-' + (o.status || "active") + '">' + (o.status || "active") + '</span></td>';
        html += '<td>';
        html += '<button class="btn btn-sm btn-outline" onclick="editOrder(' + o.id + ')">编辑</button> ';
        if (o.status === "active") {
          html += '<button class="btn btn-sm btn-outline" onclick="updateOrderStatus(' + o.id + ',\'finished\')">标记完成</button> ';
          html += '<button class="btn btn-sm btn-outline" onclick="updateOrderStatus(' + o.id + ',\'cancelled\')">取消</button> ';
        } else if (o.status === "finished" || o.status === "cancelled") {
          html += '<button class="btn btn-sm btn-outline" onclick="updateOrderStatus(' + o.id + ',\'active\')">重新激活</button> ';
        }
        html += '<button class="btn btn-sm btn-danger" onclick="deleteOrder(' + o.id + ', event)">删除</button>';
        html += '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';

      var paginationHtml = '<div class="table-pagination">' +
        '<div class="table-pagination-summary">共 ' + total + ' 条，每页 ' + size + ' 条，第 ' + page + ' / ' + totalPages + ' 页</div>' +
        '<div class="table-pagination-actions">' +
          '<button type="button" class="table-pagination-btn" onclick="changeOrdersPage(' + (page - 1) + ')"' + (page <= 1 ? ' disabled' : '') + '>上一页</button>' +
          pages.map(function (pageNo) {
            return '<button type="button" class="table-pagination-btn' + (pageNo === page ? ' active' : '') + '" onclick="changeOrdersPage(' + pageNo + ')">' + pageNo + '</button>';
          }).join('') +
          '<button type="button" class="table-pagination-btn" onclick="changeOrdersPage(' + (page + 1) + ')"' + (page >= totalPages ? ' disabled' : '') + '>下一页</button>' +
        '</div>' +
      '</div>';

      renderTable("ordersTable",
        '<div class="admin-table-shell">' +
          '<div class="admin-table-scroll-x">' + html + '</div>' +
          paginationHtml +
        '</div>'
      );
    }

    function changeOrdersPage(page) {
      var targetPage = Math.max(1, Number(page) || 1);
      if (ordersPagination.totalPages && targetPage > ordersPagination.totalPages) {
        targetPage = ordersPagination.totalPages;
      }
      if (targetPage === ordersPagination.page) return;
      if (ordersAllItemsCache.length) {
        ordersPagination.page = targetPage;
        renderOrdersTable(ordersAllItemsCache);
        return;
      }
      loadOrders(targetPage);
    }

    function normalizeCasesPayload(data, requestedPage, filters) {
      var targetPage = Math.max(1, Number(requestedPage) || 1);
      if (Array.isArray(data)) {
        var legacyItems = filterCaseItems(data.slice(), filters).sort(compareCasesByLatest);
        var totalLegacy = legacyItems.length;
        var totalLegacyPages = totalLegacy ? Math.ceil(totalLegacy / CASES_PAGE_SIZE) : 0;
        var currentLegacyPage = totalLegacyPages ? Math.min(targetPage, totalLegacyPages) : 1;
        var start = (currentLegacyPage - 1) * CASES_PAGE_SIZE;
        casesAllItemsCache = legacyItems;
        return {
          items: legacyItems.slice(start, start + CASES_PAGE_SIZE),
          page: currentLegacyPage,
          size: CASES_PAGE_SIZE,
          total: totalLegacy,
          totalPages: totalLegacyPages,
          legacyMode: true
        };
      }
      var payload = data || {};
      var items = Array.isArray(payload.items) ? payload.items.slice().sort(compareCasesByLatest) : [];
      var page = Math.max(1, Number(payload.page) || targetPage);
      var size = Math.max(1, Number(payload.size) || CASES_PAGE_SIZE);
      var total = Number(payload.total);
      if (!isFinite(total) || total < 0) total = items.length;
      casesAllItemsCache = [];
      return {
        items: items,
        page: page,
        size: size,
        total: total,
        totalPages: Math.max(0, Number(payload.totalPages) || (total ? Math.ceil(total / size) : 0)),
        legacyMode: false
      };
    }

    function renderCasesTable(data) {
      var payload = normalizeCasesPayload(data, casesPagination.page || 1, caseFilters);
      var cases = payload.items;
      var page = payload.page;
      var size = payload.size;
      var total = payload.total;
      var totalPages = payload.totalPages;
      var pages = totalPages ? getLeadsPageNumbers(page, totalPages) : [];
      casesPagination = {
        page: page,
        size: size,
        total: total,
        totalPages: totalPages
      };
      casesCache = {};

      if (total === 0) {
        toggleListToolbar("casesToolbar", true);
        renderNoData("casesTable");
        return;
      }

      toggleListToolbar("casesToolbar", true);
      var html = '<table class="admin-table"><thead><tr><th>标题</th><th>平台</th><th>描述</th><th>VIDream功能</th><th>排序</th><th>创建时间</th><th>操作</th></tr></thead><tbody>';
      cases.forEach(function (c) {
        casesCache[c.id] = c;
        html += '<tr>';
        html += '<td>' + buildLeadCell(c.title, "-") + '</td>';
        html += '<td>' + buildLeadCell(c.platform, "-") + '</td>';
        html += '<td>' + buildLeadWrapCell(c.description, "-") + '</td>';
        html += '<td>' + buildLeadWrapCell(c.vidreamFeatures, "-") + '</td>';
        html += '<td>' + (c.sortOrder || 0) + '</td>';
        html += '<td>' + escapeHTML(formatDateTimeDisplay(c.createdAt)) + '</td>';
        html += '<td><button class="btn btn-sm btn-outline" onclick="editCase(' + c.id + ')">编辑</button> ';
        html += '<button class="btn btn-sm btn-danger" onclick="deleteCase(' + c.id + ', this)">删除</button></td>';
        html += '</tr>';
      });
      html += '</tbody></table>';

      var paginationHtml = '<div class="table-pagination">' +
        '<div class="table-pagination-summary">共 ' + total + ' 条，每页 ' + size + ' 条，第 ' + page + ' / ' + totalPages + ' 页</div>' +
        '<div class="table-pagination-actions">' +
          '<button type="button" class="table-pagination-btn" onclick="changeCasesPage(' + (page - 1) + ')"' + (page <= 1 ? ' disabled' : '') + '>上一页</button>' +
          pages.map(function (pageNo) {
            return '<button type="button" class="table-pagination-btn' + (pageNo === page ? ' active' : '') + '" onclick="changeCasesPage(' + pageNo + ')">' + pageNo + '</button>';
          }).join('') +
          '<button type="button" class="table-pagination-btn" onclick="changeCasesPage(' + (page + 1) + ')"' + (page >= totalPages ? ' disabled' : '') + '>下一页</button>' +
        '</div>' +
      '</div>';

      renderTable("casesTable",
        '<div class="admin-table-shell">' +
          '<div class="admin-table-scroll-x">' + html + '</div>' +
          paginationHtml +
        '</div>'
      );
    }

    function changeCasesPage(page) {
      var targetPage = Math.max(1, Number(page) || 1);
      if (casesPagination.totalPages && targetPage > casesPagination.totalPages) {
        targetPage = casesPagination.totalPages;
      }
      if (targetPage === casesPagination.page) return;
      if (casesAllItemsCache.length) {
        renderCasesTable(normalizeCasesPayload(casesAllItemsCache, targetPage, caseFilters));
        return;
      }
      loadCases(targetPage);
    }

    function loadOrders(page) {
      var targetPage = Math.max(1, Number(page) || ordersPagination.page || 1);
      var filters = collectOrderFilters();
      var query = buildQueryString({
        title: filters.title,
        startDate: filters.startDate,
        endDate: filters.endDate
      });
      api("/api/admin/orders" + query).then(function (res) {
        if (!res.success) return;
        ordersPagination.page = targetPage;
        renderOrdersTable(res.data || []);
      });
    }

    function showAddOrder(triggerEl) {
      resetOrderForm();
      openAdminModal("adminOrderModal", triggerEl);
    }

    function editOrder(id) {
      var o = ordersCache[id];
      if (!o) { showToast("未找到订单数据", "error"); return; }
      editingOrderId = id;
      document.getElementById("orderFormTitle").textContent = "编辑订单 #" + id;
      document.getElementById("orderFormSubmitBtn").textContent = "保存";
      document.getElementById("newOrderTitle").value = o.title || "";
      document.getElementById("newOrderBudget").value = o.budget || "";
      document.getElementById("newOrderDeadline").value = o.deadline || "";
      document.getElementById("newOrderRequirements").value = o.requirements || "";
      document.getElementById("newOrderDramaType").value = o.dramaType || "";
      openAdminModal("adminOrderModal");
    }

    function resetOrderForm() {
      editingOrderId = null;
      document.getElementById("orderFormTitle").textContent = "新增订单";
      document.getElementById("orderFormSubmitBtn").textContent = "添加";
      ["newOrderTitle", "newOrderBudget", "newOrderDeadline", "newOrderRequirements", "newOrderDramaType"].forEach(function (id) {
        document.getElementById(id).value = "";
      });
    }

    function cancelOrderForm() {
      resetOrderForm();
      closeAdminModal();
    }

    function addOrder() {
      var order = {
        title: document.getElementById("newOrderTitle").value.trim(),
        budget: document.getElementById("newOrderBudget").value.trim(),
        deadline: document.getElementById("newOrderDeadline").value.trim(),
        requirements: document.getElementById("newOrderRequirements").value.trim(),
        dramaType: document.getElementById("newOrderDramaType").value.trim(),
      };
      if (!order.title) { showToast("请输入标题", "error"); return; }
      if (!editingOrderId) order.status = "active";
      var path = editingOrderId ? ("/api/admin/orders/" + editingOrderId) : "/api/admin/orders";
      var p = null;
      if (!editingOrderId) {
        p = api(path, "POST", order);
      } else {
        p = api(path, "PUT", order).then(function (res) {
          if (!res.success && (res.status === 404 || res.status === 405)) {
            return api(path, "POST", order);
          }
          return res;
        });
      }
      p.then(function (res) {
        if (res.success) {
          showToast(editingOrderId ? "订单已更新" : "订单已添加");
          cancelOrderForm();
          loadOrders();
        } else {
          showToast(res.message || (editingOrderId ? "更新失败" : "添加失败"), "error");
        }
      });
    }

    function updateOrderStatus(id, status) {
      var path = "/api/admin/orders/" + id + "/status";
      api(path, "PUT", { status: status }).then(function (res) {
        if (!res.success && (res.status === 404 || res.status === 405)) {
          return api(path, "POST", { status: status });
        }
        return res;
      }).then(function (res) {
        if (res.success) {
          showToast("状态已更新");
          loadOrders();
        } else {
          showToast(res.message || "更新失败", "error");
        }
      });
    }

    function deleteOrder(id, evt) {
      var order = ordersCache[id];
      var title = order && order.title ? order.title : ("#" + id);
      showAdminConfirm({
        title: "删除订单",
        message: "确定删除订单 " + title + " 吗？删除后无法恢复，相关兴趣登记也会一并清理。",
        confirmText: "确定删除",
        triggerEl: evt && evt.currentTarget ? evt.currentTarget : null,
        onConfirm: function () {
          return api("/api/admin/orders/" + id, "DELETE").then(function (res) {
            if (res && res.success) {
              showToast("订单已删除");
              cancelAdminConfirm(true);
              loadOrders();
            } else {
              showToast((res && res.message) ? res.message : "删除失败", "error");
            }
          }).catch(function () {
            showToast("删除失败", "error");
          });
        }
      });
    }

    function loadCases(page) {
      var targetPage = Math.max(1, Number(page) || casesPagination.page || 1);
      var filters = collectCaseFilters();
      var query = buildQueryString({
        page: targetPage,
        size: CASES_PAGE_SIZE,
        title: filters.title
      });
      api("/api/admin/cases" + query).then(function (res) {
        if (!res.success) return;
        renderCasesTable(normalizeCasesPayload(res.data, targetPage, filters));
      });
    }

    function resetCaseForm() {
      editingCaseId = null;
      document.getElementById("caseFormTitle").textContent = "新增案例";
      document.getElementById("caseFormSubmitBtn").textContent = "添加";
      ["newCaseTitle", "newCasePlatform", "newCaseDescription", "newCaseFeatures", "newCaseSortOrder"].forEach(function (id) {
        document.getElementById(id).value = "";
      });
      document.getElementById("newCaseSortOrder").value = "0";
    }

    function cancelCaseForm() {
      resetCaseForm();
      closeAdminModal();
    }

    function showAddCase(triggerEl) {
      resetCaseForm();
      openAdminModal("adminCaseModal", triggerEl);
    }

    function editCase(id) {
      var c = casesCache[id];
      if (!c) { showToast("未找到案例数据", "error"); return; }
      editingCaseId = id;
      document.getElementById("caseFormTitle").textContent = "编辑案例 #" + id;
      document.getElementById("caseFormSubmitBtn").textContent = "保存";
      document.getElementById("newCaseTitle").value = c.title || "";
      document.getElementById("newCasePlatform").value = c.platform || "";
      document.getElementById("newCaseDescription").value = c.description || "";
      document.getElementById("newCaseFeatures").value = c.vidreamFeatures || "";
      document.getElementById("newCaseSortOrder").value = c.sortOrder || 0;
      openAdminModal("adminCaseModal");
    }

    function addCase() {
      var c = {
        title: document.getElementById("newCaseTitle").value.trim(),
        platform: document.getElementById("newCasePlatform").value.trim(),
        description: document.getElementById("newCaseDescription").value.trim(),
        vidreamFeatures: document.getElementById("newCaseFeatures").value.trim(),
        sortOrder: parseInt(document.getElementById("newCaseSortOrder").value) || 0,
      };
      if (!c.title) { showToast("请输入标题", "error"); return; }
      var path = editingCaseId ? ("/api/admin/cases/" + editingCaseId) : "/api/admin/cases";
      var request = null;
      if (!editingCaseId) {
        request = api(path, "POST", c);
      } else {
        request = api(path, "PUT", c).then(function (res) {
          if (!res.success && (res.status === 404 || res.status === 405)) {
            return api(path, "POST", c);
          }
          return res;
        });
      }
      request.then(function (res) {
        if (res.success) {
          showToast(editingCaseId ? "案例已更新" : "案例已添加");
          cancelCaseForm();
          loadCases();
        } else {
          showToast(res.message || (editingCaseId ? "更新失败" : "添加失败"), "error");
        }
      });
    }

    function deleteCase(id, triggerEl) {
      pendingDeleteCaseId = id;
      deleteCaseSubmitting = false;
      var msgEl = document.getElementById("deleteCaseMessage");
      if (msgEl) msgEl.textContent = "确定删除案例 #" + id + " 吗？删除后无法恢复。";
      var btn = document.getElementById("deleteCaseConfirmBtn");
      if (btn) {
        btn.disabled = false;
        btn.textContent = "确定删除";
      }
      openAdminModal("adminDeleteCaseModal", triggerEl);
    }

    function cancelDeleteCase() {
      pendingDeleteCaseId = null;
      deleteCaseSubmitting = false;
      var btn = document.getElementById("deleteCaseConfirmBtn");
      if (btn) {
        btn.disabled = false;
        btn.textContent = "确定删除";
      }
      closeAdminModal();
    }

    function confirmDeleteCase() {
      if (!pendingDeleteCaseId) return;
      if (deleteCaseSubmitting) return;
      deleteCaseSubmitting = true;
      var id = pendingDeleteCaseId;
      var btn = document.getElementById("deleteCaseConfirmBtn");
      if (btn) {
        btn.disabled = true;
        btn.textContent = "删除中...";
      }
      api("/api/admin/cases/" + id, "DELETE").then(function (res) {
        if (res.success) {
          showToast("已删除");
          cancelDeleteCase();
          loadCases();
        } else {
          showToast(res.message || "删除失败", "error");
          deleteCaseSubmitting = false;
          if (btn) {
            btn.disabled = false;
            btn.textContent = "确定删除";
          }
        }
      }).catch(function () {
        showToast("删除失败", "error");
        deleteCaseSubmitting = false;
        if (btn) {
          btn.disabled = false;
          btn.textContent = "确定删除";
        }
      });
    }

    function escapeHTML(str) {
      if (!str) return "";
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>

</html>
